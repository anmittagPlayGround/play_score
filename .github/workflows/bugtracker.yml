name: Open Bug Count Tracker

on:
  schedule:
    # Run once a day at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  track_bugs:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create/upload artifacts
      issues: read    # Needed to read issues

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install PyGithub pandas

      - name: Get GitHub Bug Data
        id: get_bug_data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Automatically provided by GitHub
          MAIN_REPOSITORY: anmittagPlayGround/play_score # IMPORTANT: Replace with your main repository
          SUB_REPOSITORIES: anmittagPlayGround/play_baselibs,anmittagPlayGround/play_communication,anmittagPlayGround/play_persistency # IMPORTANT: Replace with your sub repositories, comma-separated
        run: |
          python << EOF
          import os
          from github import Github
          import pandas as pd
          from datetime import datetime, timedelta

          GITHUB_TOKEN = os.environ.get('GITHUB_TOKEN')
          MAIN_REPOSITORY = os.environ.get('MAIN_REPOSITORY')
          SUB_REPOSITORIES = os.environ.get('SUB_REPOSITORIES').split(',')
          ALL_REPOSITORIES = [MAIN_REPOSITORY] + SUB_REPOSITORIES

          g = Github(GITHUB_TOKEN)

          all_bug_data = []
          today = datetime.now()
          three_months_ago = today - timedelta(days=90) # Last 3 months

          print(f"Collecting open bug data for repositories: {ALL_REPOSITORIES}")

          for repo_name in ALL_REPOSITORIES:
              try:
                  repo = g.get_repo(repo_name.strip())
                  print(f"Fetching issues for {repo_name}...")
                  # Filter by state=open and label=bug
                  issues = repo.get_issues(state='open', labels=['bug'])

                  for issue in issues:
                      # We're interested in bugs that are currently open AND were created within the last 3 months
                      # This gives us a count of *currently open* bugs whose creation falls within the window.
                      # To get "bugs open on a specific day", we need a different logic as before.
                      # Here, we will count all currently open bugs and their creation date.
                      # We will then calculate daily totals for bugs that were created up to that day and are still open.
                      
                      all_bug_data.append({
                          'repository': repo_name,
                          'issue_number': issue.number,
                          'title': issue.title,
                          'created_at': issue.created_at.strftime('%Y-%m-%d')
                      })
              except Exception as e:
                  print(f"Error fetching issues for {repo_name}: {e}")

          if not all_bug_data:
              print("No open bug data found for any repository.")
              exit()

          df = pd.DataFrame(all_bug_data)

          # Ensure 'created_at' is datetime for proper sorting
          df['created_at'] = pd.to_datetime(df['created_at'])

          # Create a date range for the last 3 months
          date_range = pd.date_range(start=three_months_ago.strftime('%Y-%m-%d'), end=today.strftime('%Y-%m-%d'))

          daily_summary = []
          for single_date in date_range:
              date_str = single_date.strftime('%Y-%m-%d')
              # Count unique issues that were created on or before this specific day
              # and are currently still open (as per our initial fetch)
              daily_issues_count = df[df['created_at'] <= single_date]['issue_number'].nunique()
              
              daily_summary.append({
                  'date': date_str,
                  'open_bug_count': daily_issues_count
              })

          # Convert to DataFrame and sort by date
          daily_df = pd.DataFrame(daily_summary)
          daily_df['date'] = pd.to_datetime(daily_df['date'])
          daily_df = daily_df.sort_values(by='date')

          # Save to CSV
          output_filename = 'open_bugs_daily_count.csv'
          daily_df.to_csv(output_filename, index=False)
          print(f"Data saved to {output_filename}")

          EOF

      - name: Upload bug data artifact
        uses: actions/upload-artifact@v4
        with:
          name: open-bug-data
          path: open_bugs_daily_count.csv
          retention-days: 90 # Keep artifacts for 3 months
